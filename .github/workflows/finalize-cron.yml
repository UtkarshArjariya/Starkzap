name: Trigger finalize endpoint

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Required secrets:
#   FINALIZE_URL  – Full URL of the finalize endpoint, e.g. https://dareboard.vercel.app/api/finalize
#   CRON_SECRET   – Bearer token used to authorize the request

jobs:
  trigger-finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Call finalize endpoint
        env:
          FINALIZE_URL: ${{ secrets.FINALIZE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$FINALIZE_URL" ]; then
            echo "FINALIZE_URL secret is not set. Skipping."
            exit 0
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set. Skipping."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            --header "Content-Type: application/json" \
            "$FINALIZE_URL"
